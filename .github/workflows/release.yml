name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-artifacts:
    name: Build Release Artifact (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            bundles: dmg
          - os: macos-latest
            label: macos-x86_64
            target: x86_64-apple-darwin
            bundles: dmg
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            bundles: deb
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 12)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm -f "$CERT_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri bundles
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Debug — list target directory
        if: always()
        shell: bash
        run: |
          echo "=== Target directory contents ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f 2>/dev/null || echo "Bundle dir does not exist"
          echo "=== Checking alternative paths ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || echo "target/release/bundle does not exist either"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          LABEL="${{ matrix.label }}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          echo "Looking for bundles in: ${BUNDLE_DIR}"
          find "${BUNDLE_DIR}" -type f \( -name "*.dmg" -o -name "*.deb" \) 2>/dev/null || echo "No bundles found"

          if [ "${{ runner.os }}" = "macOS" ]; then
            for f in "${BUNDLE_DIR}"/dmg/*.dmg; do
              [ -f "$f" ] && cp "$f" "release-assets/busydev-${RELEASE_TAG}-${LABEL}.dmg"
            done
          elif [ "${{ runner.os }}" = "Linux" ]; then
            for f in "${BUNDLE_DIR}"/deb/*.deb; do
              [ -f "$f" ] && cp "$f" "release-assets/"
            done
          fi

          echo "Release assets:"
          ls -la release-assets/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Build commit range for changelog
        id: changelog-range
        shell: bash
        run: |
          CURRENT_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -vx "${CURRENT_TAG}" | head -n 1 || true)"

          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi

          git rev-list --reverse "${RANGE}" > commits.txt
          COMMIT_COUNT="$(wc -l < commits.txt | tr -d ' ')"

          echo "current_tag=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          echo "range=${RANGE}" >> "$GITHUB_OUTPUT"
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Generate full changelog
        id: changelog
        uses: actions/github-script@v7
        env:
          CURRENT_TAG: ${{ steps.changelog-range.outputs.current_tag }}
          PREVIOUS_TAG: ${{ steps.changelog-range.outputs.previous_tag }}
          COMMIT_RANGE: ${{ steps.changelog-range.outputs.range }}
          COMMIT_COUNT: ${{ steps.changelog-range.outputs.commit_count }}
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentTag = process.env.CURRENT_TAG;
            const previousTag = process.env.PREVIOUS_TAG;
            const commitRange = process.env.COMMIT_RANGE;
            const commitCount = Number(process.env.COMMIT_COUNT || "0");

            const commitShas = fs
              .readFileSync("commits.txt", "utf8")
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean);

            const pullRequests = new Map();

            for (const sha of commitShas) {
              const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: sha,
              });

              for (const pr of response.data) {
                if (!pullRequests.has(pr.number)) {
                  pullRequests.set(pr.number, pr);
                }
              }
            }

            const prs = [...pullRequests.values()].sort((a, b) => a.number - b.number);
            const issueRegex = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi;

            const linkedIssues = new Set();
            const breakingChanges = [];

            for (const pr of prs) {
              const title = pr.title || "";
              const body = pr.body || "";
              const labels = (pr.labels || []).map((label) => String(label.name || "").toLowerCase());

              let match;
              while ((match = issueRegex.exec(body)) !== null) {
                linkedIssues.add(Number(match[1]));
              }

              const isBreaking =
                labels.includes("breaking-change") ||
                labels.includes("breaking") ||
                /breaking change/i.test(title) ||
                /breaking change/i.test(body);

              if (isBreaking) {
                breakingChanges.push(pr);
              }
            }

            const lines = [];
            lines.push(`# busydev ${currentTag}`);
            lines.push("");
            lines.push("## Release Summary");
            lines.push("");
            lines.push(`- Tag: \`${currentTag}\``);
            if (previousTag) {
              lines.push(`- Previous tag: \`${previousTag}\``);
            } else {
              lines.push("- Previous tag: _none (first tagged release)_");
            }
            lines.push(`- Commit range: \`${commitRange}\``);
            lines.push(`- Commits included: ${commitCount}`);
            lines.push(`- Merged pull requests: ${prs.length}`);
            lines.push(`- Linked issues: ${linkedIssues.size}`);
            lines.push("");

            lines.push("## Merged Pull Requests");
            lines.push("");
            if (prs.length === 0) {
              lines.push("- None");
            } else {
              for (const pr of prs) {
                lines.push(`- #${pr.number} ${pr.title} (${pr.html_url})`);
              }
            }
            lines.push("");

            lines.push("## Linked Issues");
            lines.push("");
            if (linkedIssues.size === 0) {
              lines.push("- None");
            } else {
              for (const issueNumber of [...linkedIssues].sort((a, b) => a - b)) {
                lines.push(`- #${issueNumber} https://github.com/${owner}/${repo}/issues/${issueNumber}`);
              }
            }
            lines.push("");

            lines.push("## Notable Breaking Changes");
            lines.push("");
            if (breakingChanges.length === 0) {
              lines.push("- None noted in this release.");
            } else {
              for (const pr of breakingChanges) {
                lines.push(`- #${pr.number} ${pr.title} (${pr.html_url})`);
              }
            }
            lines.push("");

            fs.writeFileSync("RELEASE_NOTES.md", lines.join("\n"), "utf8");

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: RELEASE_NOTES.md
